<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RemoteDesk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.5/signalr.min.js"></script>
</head>
<body>

    <!-- ── Login Screen ──────────────────────────────────────────────────────── -->
    <div id="loginScreen" class="screen active">
        <div class="login-bg">
            <div class="grid-overlay"></div>
            <div class="scan-line"></div>
        </div>
        <div class="login-card">
            <div class="login-logo">
                <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
                    <rect x="2" y="2" width="40" height="40" rx="8" stroke="#4af" stroke-width="2" />
                    <rect x="8" y="14" width="28" height="18" rx="3" fill="none" stroke="#4af" stroke-width="1.5" />
                    <line x1="15" y1="32" x2="29" y2="32" stroke="#4af" stroke-width="2" stroke-linecap="round" />
                    <circle cx="22" cy="23" r="4" fill="#4af" opacity="0.7" />
                    <circle cx="22" cy="23" r="2" fill="#4af" />
                </svg>
                <span class="logo-text">RemoteDesk</span>
            </div>
            <h1 class="login-title">Secure Access</h1>
            <p class="login-subtitle">Authenticate to manage your remote computers</p>

            <div id="loginError" class="error-banner hidden"></div>

            <div class="field-group">
                <label>Username</label>
                <input id="inputUsername" type="text" placeholder="admin" autocomplete="username" />
            </div>
            <div class="field-group">
                <label>Password</label>
                <input id="inputPassword" type="password" placeholder="••••••••" autocomplete="current-password" />
            </div>
            <button id="btnLogin" class="btn-primary" onclick="doLogin()">
                <span>Sign In</span>
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" /></svg>
            </button>
            <p class="login-hint">Default: admin / admin123</p>
        </div>
    </div>

    <!-- ── Dashboard ─────────────────────────────────────────────────────────── -->
    <div id="dashboardScreen" class="screen">
        <nav class="topbar">
            <div class="topbar-left">
                <div class="topbar-logo">
                    <svg width="28" height="28" viewBox="0 0 44 44" fill="none">
                        <rect x="8" y="14" width="28" height="18" rx="3" fill="none" stroke="#4af" stroke-width="1.8" />
                        <circle cx="22" cy="23" r="4" fill="#4af" opacity="0.8" />
                        <circle cx="22" cy="23" r="2" fill="#4af" />
                    </svg>
                    <span>RemoteDesk</span>
                </div>
            </div>
            <div class="topbar-center">
                <div class="status-pill" id="hubStatus">
                    <span class="dot red"></span>
                    <span>Connecting…</span>
                </div>
            </div>
            <div class="topbar-right">
                <span id="usernameDisplay" class="username-chip"></span>
                <button class="btn-icon" onclick="doLogout()" title="Sign out">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" y1="12" x2="9" y2="12" />
                    </svg>
                </button>
            </div>
        </nav>

        <div class="dash-body">
            <aside class="sidebar">
                <div class="sidebar-section">
                    <div class="sidebar-title">CONNECTED PCs</div>
                    <div id="pcList" class="pc-list">
                        <div class="pc-empty">No PCs online</div>
                    </div>
                </div>
                <div class="sidebar-section sidebar-actions">
                    <button class="btn-secondary" onclick="refreshPcList()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="23 4 23 10 17 10" /><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" /></svg>
                        Refresh List
                    </button>
                </div>
            </aside>

            <main class="viewer-area" id="viewerArea">
                <div class="viewer-placeholder" id="viewerPlaceholder">
                    <div class="placeholder-icon">
                        <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
                            <rect x="4" y="12" width="56" height="36" rx="5" stroke="rgba(100,160,255,0.3)" stroke-width="2" />
                            <rect x="20" y="48" width="24" height="4" fill="rgba(100,160,255,0.2)" rx="2" />
                            <circle cx="32" cy="30" r="10" stroke="rgba(100,160,255,0.3)" stroke-width="2" />
                            <line x1="32" y1="20" x2="32" y2="24" stroke="rgba(100,160,255,0.5)" stroke-width="2" stroke-linecap="round" />
                            <line x1="32" y1="36" x2="32" y2="40" stroke="rgba(100,160,255,0.5)" stroke-width="2" stroke-linecap="round" />
                            <line x1="22" y1="30" x2="26" y2="30" stroke="rgba(100,160,255,0.5)" stroke-width="2" stroke-linecap="round" />
                            <line x1="38" y1="30" x2="42" y2="30" stroke="rgba(100,160,255,0.5)" stroke-width="2" stroke-linecap="round" />
                        </svg>
                    </div>
                    <p class="placeholder-title">No active session</p>
                    <p class="placeholder-sub">Select a PC from the sidebar to begin remote access</p>
                </div>

                <div class="viewer-wrap hidden" id="viewerWrap">
                    <div class="viewer-toolbar">
                        <div class="viewer-pc-name" id="viewerPcName">—</div>
                        <div class="toolbar-badges">
                            <span class="badge live" id="badgeLive">● LIVE</span>
                            <span class="badge fps" id="badgeFps">— fps</span>
                        </div>
                        <div class="toolbar-controls">
                            <button class="btn-toolbar" id="btnFullscreen" onclick="toggleFullscreen()" title="Fullscreen">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3" /></svg>
                            </button>
                            <button class="btn-toolbar btn-disconnect" onclick="disconnectViewer()" title="Disconnect">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg>
                            </button>
                        </div>
                    </div>
                    <div class="canvas-container" id="canvasContainer">
                        <canvas id="remoteCanvas"></canvas>
                        <div class="cursor-overlay" id="cursorOverlay"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
